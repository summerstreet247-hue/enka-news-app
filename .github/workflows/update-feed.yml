name: Update news feed and deploy

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"   # 日本時間 10:00 / 16:00 / 22:00 / 4:00 に実行
  workflow_dispatch: {}            # 手動実行もできるようにしておく
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest news
        run: python3 scraper/fetch_news.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
