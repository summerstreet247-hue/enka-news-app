<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>若手演歌歌手最新ニュース！</title>
<meta name="theme-color" content="#1c3f5e">
<meta name="robots" content="noindex, nofollow">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="演歌ニュース">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" id="app">
    <button id="close-btn" class="close-btn" aria-label="アプリを閉じる">×</button>

    <div id="pull-indicator" class="pull-indicator"><span class="spinner"></span><span class="pull-label">引っ張って更新</span></div>

    <header class="app-header">
      <p class="app-title">若手演歌歌手最新ニュース！</p>
      <p class="app-sub">好きな歌手の最新情報が、ここに集まります</p>
    </header>

    <button id="updated-bar" class="updated-bar" type="button">読み込んでいます…</button>

    <div class="artist-filters" id="artist-filters">
      <button class="filter-btn" data-artist="青山新">青山新</button>
      <button class="filter-btn" data-artist="二見颯一">二見颯一</button>
      <button class="filter-btn" data-artist="真田ナオキ">真田ナオキ</button>
    </div>

    <div class="section-label">
      <span id="section-label-text">新着</span>
      <button id="reset-filter" class="reset-link" hidden>すべて見る</button>
    </div>
    <div id="feed" class="feed"></div>
    <div id="load-more-wrap" class="load-more-wrap" hidden>
      <button id="load-more-btn" class="load-more-btn">次へ（もっと見る）</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
