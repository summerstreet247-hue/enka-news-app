<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe3ea"/>
      <stop offset="1" stop-color="#f6cad9"/>
    </linearGradient>
    <g id="petal">
      <ellipse cx="0" cy="-30" rx="15" ry="25"/>
    </g>
    <g id="blossom">
      <use href="#petal"/>
      <use href="#petal" transform="rotate(72)"/>
      <use href="#petal" transform="rotate(144)"/>
      <use href="#petal" transform="rotate(216)"/>
      <use href="#petal" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="7"/>
    </g>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <g fill="#f0a9c2" opacity="0.7">
    <use href="#blossom" transform="translate(96,104) scale(0.9) rotate(-12)"/>
    <use href="#blossom" transform="translate(430,90) scale(0.6) rotate(20)"/>
    <use href="#blossom" transform="translate(420,430) scale(1.05) rotate(8)"/>
    <use href="#blossom" transform="translate(88,420) scale(0.55) rotate(-30)"/>
  </g>

  <text x="256" y="330" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="250" font-weight="600" fill="#8a3348" text-anchor="middle">歌</text>
</svg>
